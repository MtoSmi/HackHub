$kind: http-request
description: Create a new help request directed to a mentor.
url: "{{baseUrl}}/api/v1/helpRequest/create"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Need help with ML model",
      "description": "We are struggling with training our model on the provided dataset.",
      "fromId": 1,
      "toId": 3
    }
order: 1000
